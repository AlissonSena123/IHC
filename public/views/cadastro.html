<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinica Inteligente - Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row vh-100 justify-content-center align-items-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">
                            Cadastro de Usuário
                        </h2>
                        <form id="cadastroForm">
                            <div class="mb-3">
                                <label class="form-label">
                                    Nome Completo
                                </label>
                                <input type="text" id="nome" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Email
                                </label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Senha
                                </label>
                                <input type="password" id="senha" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Confirmar Senha
                                </label>
                                <input type="password" id="confirmarSenha" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Perfil
                                </label>
                                <select id="perfil" class="form-select">
                                    <option value="PSICOLOGO">
                                        Psicólogo
                                    </option>
                                    <option value="RECEPCIONISTA">
                                        Recepcionista
                                    </option>
                                </select>
                            </div>
                            <button class="btn btn-success w-100">
                                Cadastrar
                            </button>
                        </form>
                        <div id="mensagem" class="mt-3"></div>
                        <div class="text-center mt-3">
                            <a href="/login">
                                Voltar para Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="../js/cadastro.js"></script>
</body>
</html>
